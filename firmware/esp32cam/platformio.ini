; esp32cam — Hearth Legacy cam (AI-Thinker ESP32-CAM)
; Build: `pio run`   Flash: see README (FTDI + GPIO0->GND).
[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino
monitor_speed = 115200

board_build.partitions = partitions.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    knolleary/PubSubClient @ ^2.8
    symlink://../common
