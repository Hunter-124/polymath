# Fly.io deployment for the Hearth relay.
#   fly launch --no-deploy      # (or reuse this file) to create the app
#   fly secrets set RELAY_HOMES='{"home-abc123":"<long-random-secret>"}'
#   fly deploy
#
# Pick a unique app name and your closest region.
app = "hearth-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # The relay listens here; Fly proxies external 443/80 to this internal port.
  PORT = "8080"
  LOG_LEVEL = "info"
  # Set RELAY_OPEN / RELAY_HOMES via `fly secrets set …`, NOT here.

[http_service]
  internal_port = 8080
  force_https = true
  # The relay holds long-lived agent + client WebSockets, so keep at least one
  # machine running rather than scaling to zero.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
