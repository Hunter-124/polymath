# Render.com blueprint for the Hearth relay.
# Commit this file, then in Render: New → Blueprint → point at this repo.
# Set RELAY_HOMES (and any overrides) as a secret env var in the dashboard.
services:
  - type: web
    name: hearth-relay
    runtime: docker
    dockerfilePath: ./cloud/relay/Dockerfile
    dockerContext: ./cloud/relay
    plan: starter # the relay holds persistent WebSockets — do not use a scale-to-zero plan
    healthCheckPath: /healthz
    envVars:
      # Render injects its own PORT; the app honours it.
      - key: PORT
        value: 8080
      - key: LOG_LEVEL
        value: info
      - key: RELAY_OPEN
        value: "false"
      # Provide the home allow-list as a dashboard secret (sync:false → not in git).
      - key: RELAY_HOMES
        sync: false
