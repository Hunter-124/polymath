; hmm — Hearth Measurement Module (ESP32-S3 + Qwiic/STEMMA-QT sensors)
[env:hmm_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    knolleary/PubSubClient @ ^2.8
    symlink://../common
    ; Add ONLY the driver libs for the tiles you enable in config.h:
    adafruit/Adafruit SHT4x Library          ; HEARTH_TILE_SHT45
    sensirion/Sensirion I2C SCD4x            ; HEARTH_TILE_SCD41
    ; sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library  ; HEARTH_TILE_NAU7802
    ; adafruit/Adafruit MAX31865 library     ; HEARTH_TILE_MAX31865
    ; adafruit/Adafruit MAX31856 library     ; HEARTH_TILE_MAX31856
    ; adafruit/Adafruit BMP3XX Library       ; HEARTH_TILE_BMP390
    ; adafruit/Adafruit INA228 Library       ; HEARTH_TILE_INA228
    ; adafruit/Adafruit AS7341               ; HEARTH_TILE_AS7341
    ; (EZO-pH needs no extra lib — raw I2C in tiles.cpp)
