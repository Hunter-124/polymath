; cam-esp32s3 — Hearth Budget cam (Seeed XIAO ESP32-S3 Sense)
; Build: `pio run`   Flash: `pio run -t upload`   Monitor: `pio device monitor`
[env:xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi   ; enable PSRAM (Sense has 8MB)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    knolleary/PubSubClient @ ^2.8
    symlink://../common

; The esp32-camera + SD_MMC + mbedTLS components ship with the espressif32
; Arduino core, so no extra lib_deps are needed for them.
; To build with a real ESP-DL person model, add the esp-dl component and define
; HEARTH_HAVE_ESPDL in config.h (see person_detector.cpp TODO(model)).
