; voice-sat — Hearth voice satellite (ESP32-S3 + I2S mic/amp)
; Three hardware variants as separate environments. Build a specific one:
;   pio run -e bundled_mic   (default board: ICS-43434 mic + MAX98357A amp)
;   pio run -e respeaker     (Seeed ReSpeaker Lite)
;   pio run -e xvf3800       (XMOS XVF3800 dev kit)
[platformio]
default_envs = bundled_mic

[common]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
lib_deps =
    knolleary/PubSubClient @ ^2.8
    symlink://../common
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    ; Opus: set HEARTH_CODEC_OPUS=1 in config.h and add an Opus lib + -DHEARTH_HAVE_OPUS.
    ; microWakeWord: add the TFLite-Micro model + -DHEARTH_HAVE_MWW (see wakeword.cpp).

[env:bundled_mic]
extends = common
build_flags = ${common.build_flags} -DHEARTH_HW_BUNDLED_MIC

[env:respeaker]
extends = common
build_flags = ${common.build_flags} -DHEARTH_HW_RESPEAKER

[env:xvf3800]
extends = common
build_flags = ${common.build_flags} -DHEARTH_HW_XVF3800
