; cam-esp32s3-grove — Hearth Standard cam (XIAO ESP32-S3 + Grove Vision AI V2)
[env:xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    ; Define HEARTH_HAVE_SSCMA + add the lib below to enable real YOLOv8 detection.
    ; -DHEARTH_HAVE_SSCMA

lib_deps =
    knolleary/PubSubClient @ ^2.8
    symlink://../common
    ; seeed-studio/Seeed_Arduino_SSCMA   ; uncomment with -DHEARTH_HAVE_SSCMA
